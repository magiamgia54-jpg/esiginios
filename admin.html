```html
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Admin</title>

</head>

<body style="font-family:Arial">

<h2>Quản lý nạp tiền</h2>

<table border="1" width="100%">

<tr>

<th>User</th>
<th>Tiền</th>
<th>Trạng thái</th>
<th>Duyệt</th>

</tr>

<tbody id="list"></tbody>

</table>

<script>

let bills=JSON.parse(localStorage.getItem("bill"))||[]

function load(){

let html=""

bills.forEach((b,i)=>{

html+=`

<tr>

<td>${b.user}</td>

<td>${b.money}</td>

<td>${b.status}</td>

<td>

<button onclick="duyet(${i})">Duyệt</button>

</td>

</tr>

`

})

document.getElementById("list").innerHTML=html

}

function duyet(i){

bills[i].status="Đã duyệt"

let users=JSON.parse(localStorage.getItem("users"))||[]

let u=users.find(x=>x.username==bills[i].user)

if(u){

u.money+=parseInt(bills[i].money)

}

localStorage.setItem("users",JSON.stringify(users))

localStorage.setItem("bill",JSON.stringify(bills))

load()

}

load()

</script>

</body>
</htm>
