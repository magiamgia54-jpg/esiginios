<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Admin duyệt nạp</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:10px;
text-align:center;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.duyet{
background:#00c853;
color:white;
}

.xoa{
background:red;
color:white;
}

</style>

</head>

<body>

<h2>Danh sách bill nạp</h2>

<table>

<tr>
<th>User</th>
<th>Số tiền</th>
<th>Thời gian</th>
<th>Duyệt</th>
<th>Xóa</th>
</tr>

<tbody id="list"></tbody>

</table>

<script>

function load(){

let data=JSON.parse(localStorage.getItem("billnap"))||[]

let html=""

data.forEach((e,i)=>{

html+=`

<tr>

<td>${e.user}</td>

<td>${e.tien}</td>

<td>${e.time}</td>

<td>
<button class="duyet" onclick="duyet(${i})">Duyệt</button>
</td>

<td>
<button class="xoa" onclick="xoa(${i})">Xóa</button>
</td>

</tr>

`

})

document.getElementById("list").innerHTML=html

}

function duyet(i){

let data=JSON.parse(localStorage.getItem("billnap"))||[]

alert("Đã duyệt cho "+data[i].user)

data.splice(i,1)

localStorage.setItem("billnap",JSON.stringify(data))

load()

}

function xoa(i){

let data=JSON.parse(localStorage.getItem("billnap"))||[]

data.splice(i,1)

localStorage.setItem("billnap",JSON.stringify(data))

load()

}

load()

</script>

</body>
</html>
