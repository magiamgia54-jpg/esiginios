<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#333;
color:white;
}

input{
width:80px;
padding:5px;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{
background:#4CAF50;
color:white;
}

.sub{
background:#f44336;
color:white;
}

</style>

</head>

<body>

<h1>ADMIN PANEL</h1>

<table>

<tr>
<th>User</th>
<th>Số dư</th>
<th>Nhập tiền</th>
<th>Cộng</th>
<th>Trừ</th>
</tr>

<tbody id="userTable"></tbody>

</table>

<script>

function loadUsers(){

let users = JSON.parse(localStorage.getItem("users")) || []

let html=""

if(users.length==0){
html="<tr><td colspan='5'>Chưa có user</td></tr>"
}

users.forEach((u,i)=>{

html+=`
<tr>

<td>${u.username}</td>

<td>${u.balance || 0} đ</td>

<td>
<input type="number" id="money${i}">
</td>

<td>
<button class="add" onclick="addMoney(${i})">
Cộng
</button>
</td>

<td>
<button class="sub" onclick="subMoney(${i})">
Trừ
</button>
</td>

</tr>
`

})

document.getElementById("userTable").innerHTML=html

}

function addMoney(i){

let users = JSON.parse(localStorage.getItem("users")) || []

let money = document.getElementById("money"+i).value

if(money=="") return

users[i].balance = (users[i].balance || 0) + parseInt(money)

localStorage.setItem("users",JSON.stringify(users))

loadUsers()

}

function subMoney(i){

let users = JSON.parse(localStorage.getItem("users")) || []

let money = document.getElementById("money"+i).value

if(money=="") return

users[i].balance = (users[i].balance || 0) - parseInt(money)

if(users[i].balance < 0) users[i].balance = 0

localStorage.setItem("users",JSON.stringify(users))

loadUsers()

}

loadUsers()

</script>

</body>
</html>
