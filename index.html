<body>

</div>

<h2>Đăng nhập</h2>

<input id="loginUser" placeholder="Tên tài khoản">

<input id="loginPass" type="password" placeholder="Mật khẩu">

<br>

<button onclick="login()">Đăng nhập</button>

<h2>Đăng ký</h2>

<input id="regUser" placeholder="Tên tài khoản">

<input id="regPass" type="password" placeholder="Mật khẩu">

<br>

<button onclick="register()">Đăng ký</button>

<script>

/* menu */

function openMenu(){

let m=document.getElementById("menu")

m.style.display=(m.style.display=="block")?"none":"block"

}

/* đăng ký */

function register(){

let user=document.getElementById("regUser").value
let pass=document.getElementById("regPass").value

let users=JSON.parse(localStorage.getItem("users"))||[]

users.push({
username:user,
password:pass,
money:0
})

localStorage.setItem("users",JSON.stringify(users))

alert("Đăng ký thành công")

}

/* đăng nhập */

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

let users=JSON.parse(localStorage.getItem("users"))||[]

let u=users.find(x=>x.username==user && x.password==pass)

if(u){

localStorage.setItem("login",user)

alert("Đăng nhập thành công")

location.reload()

}else{

alert("Sai tài khoản")

}

}

/* load user */

function loadUser(){

let login=localStorage.getItem("login")

if(!login) return

document.getElementById("username").innerHTML=login
document.getElementById("hello").innerHTML=login

}

/* load số dư */

function loadBalance(){

let login=localStorage.getItem("login")

if(!login) return

let users=JSON.parse(localStorage.getItem("users"))||[]

let u=users.find(x=>x.username==login)

if(u){

document.getElementById("balance").innerHTML=u.money+"đ"

}

}

/* đăng xuất */

function logout(){

localStorage.removeItem("login")

location.reload()

}

/* chào theo giờ */

function greeting(){

let hour=new Date().getHours()

let text=""

if(hour>=5 && hour<12){

text="🌅 Chào Buổi Sáng - Chúc Bạn 1 Ngày Vui Vẻ Cùng Thắng IOS"

}
else if(hour>=12 && hour<18){

text="☀️ Chào Buổi Chiều - Chúc Bạn 1 Ngày Vui Vẻ Cùng Thắng IOS"

}
else{

text="🌙 Chào Buổi Tối - Chúc Bạn Buổi Tối Vui Vẻ Cùng Thắng IOS"

}

alert(text)

}

/* chữ tự viết */

const text="Mua Chứng Chỉ Esign Liên Hệ Telegram @iossigm"

let i=0
let deleting=false

function typing(){

let el=document.getElementById("typing")

if(!deleting){

el.innerHTML=text.substring(0,i)

i++

if(i>text.length){

deleting=true

setTimeout(typing,1500)

return

}

}else{

el.innerHTML=text.substring(0,i)

i--

if(i<0){

deleting=false
i=0

}

}

setTimeout(typing,80)

}

typing()

/* load */

window.onload=function(){

loadUser()
loadBalance()
greeting()

}

</script>

</body>
