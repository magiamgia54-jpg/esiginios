
<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Thắng IOS Sign</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* LOGIN */

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

input{
width:260px;
padding:12px;
margin:8px;
border:none;
border-radius:8px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

/* HOME */

.home{
display:none;
}

/* HEADER */

.header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu{
font-size:22px;
cursor:pointer;
}

/* MENU */

.userMenu{
display:none;
position:absolute;
right:10px;
top:60px;
background:#1e293b;
border-radius:10px;
}

.userMenu a{
display:block;
padding:10px 20px;
color:white;
text-decoration:none;
}

/* CARD */

.card{
background:#1e293b;
margin:20px;
padding:20px;
border-radius:12px;
}

/* APP */

.app{
display:flex;
justify-content:space-between;
align-items:center;
}

.install{
background:#00c853;
padding:10px 20px;
border-radius:10px;
}

/* chữ chạy */

.typing{
color:#00aaff;
text-align:center;
font-weight:bold;
}

/* tuyết */

.snow{
position:fixed;
top:-10px;
color:white;
font-size:18px;
pointer-events:none;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginPage">

<h2>Đăng nhập</h2>

<input id="loginUser" placeholder="Tên tài khoản">
<input id="loginPass" type="password" placeholder="Mật khẩu">

<button onclick="login()">Đăng nhập</button>

<h3>Đăng ký</h3>

<input id="regUser" placeholder="Tên tài khoản">
<input id="regPass" type="password" placeholder="Mật khẩu">

<button onclick="register()">Đăng ký</button>

</div>


<!-- HOME -->

<div class="home" id="homePage">

<div class="header">

<div class="menu" onclick="openMenu()">☰</div>

<div id="hello"></div>

</div>

<div class="userMenu" id="menu">

<a onclick="showBalance()">💰 Số dư</a>
<a href="nap.html">💳 Nạp tiền</a>
<a onclick="logout()">🚪 Đăng xuất</a>

</div>

<div class="card">

<h2 id="typing" class="typing"></h2>

<h3>Mua chứng chỉ</h3>

<p>Zalo: 0395251479</p>
<p>Telegram: @iossigm</p>

</div>


<div class="card">

<h2>Signed App</h2>

<div class="app">

<div>

<b>Delta VNG Fix Lag IOS</b>
<p>Version 2.7.10</p>

</div>

<div class="install">Install</div>

</div>

</div>

</div>


<script>

/* menu */

function openMenu(){

let m=document.getElementById("menu")

m.style.display=(m.style.display=="block")?"none":"block"

}

/* đăng ký */

function register(){

let user=document.getElementById("regUser").value
let pass=document.getElementById("regPass").value

let users=JSON.parse(localStorage.getItem("users"))||[]

users.push({
username:user,
password:pass,
money:0
})

localStorage.setItem("users",JSON.stringify(users))

alert("Đăng ký thành công")

}

/* đăng nhập */

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

let users=JSON.parse(localStorage.getItem("users"))||[]

let u=users.find(x=>x.username==user && x.password==pass)

if(u){

localStorage.setItem("login",user)

showHome()

}else{

alert("Sai tài khoản")

}

}

/* hiện home */

function showHome(){

document.getElementById("loginPage").style.display="none"

document.getElementById("homePage").style.display="block"

let user=localStorage.getItem("login")

document.getElementById("hello").innerHTML="👋 "+user

greeting()

}

/* chào */

function greeting(){

let hour=new Date().getHours()

if(hour<18){

alert("🌤 Chào Buổi Sáng - Chúc Bạn 1 Ngày Vui Vẻ Cùng Thắng IOS")

}else{

alert("🌙 Chào Buổi Tối - Chúc Bạn Buổi Tối Vui Vẻ Cùng Thắng IOS")

}

}

/* chữ tự viết */

let text="Chào mừng bạn đến với Thắng IOS Sign"
let i=0
let typing=true

function typeEffect(){

let el=document.getElementById("typing")

if(typing){

el.innerHTML=text.substring(0,i)

i++

if(i>text.length){

typing=false
setTimeout(typeEffect,1000)
return

}

}else{

el.innerHTML=text.substring(0,i)

i--

if(i==0){

typing=true

}

}

setTimeout(typeEffect,80)

}

typeEffect()

/* số dư */

function showBalance(){

let login=localStorage.getItem("login")

let users=JSON.parse(localStorage.getItem("users"))||[]

let u=users.find(x=>x.username==login)

alert("Số dư: "+u.money+" VNĐ")

}

/* logout */

function logout(){

localStorage.removeItem("login")

location.reload()

}

/* auto login */

window.onload=function(){

let login=localStorage.getItem("login")

if(login){

showHome()

}

}

/* tuyết */

function snow(){

let s=document.createElement("div")

s.className="snow"

s.innerHTML="❄"

s.style.left=Math.random()*window.innerWidth+"px"

s.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(s)

setTimeout(()=>{s.remove()},10000)

}

setInterval(snow,200)

</script>

</body>
</html>
