<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lý Văn Thắng</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e6e6e6;
text-align:center;
}

.topbar{
width:100%;
height:60px;
background:#5a5a5a;
display:flex;
justify-content:flex-end;
align-items:center;
padding-right:20px;
}

.menu{
font-size:28px;
color:white;
}

.logo{
margin-top:50px;
}

.logo img{
width:130px;
height:130px;
border-radius:50%;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
font-size:22px;
margin-top:25px;
}

.big{
font-size:38px;
font-weight:bold;
margin:10px;
}

.dev{
font-size:32px;
margin-top:20px;
}

#typing{
color:#6b7cff;
font-weight:bold;
}

.desc{
margin-top:25px;
font-size:18px;
color:#333;
}

.social{
display:flex;
justify-content:center;
gap:25px;
margin-top:40px;
}

.box{
width:110px;
height:80px;
background:#333;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.box img{
width:40px;
}

a{
text-decoration:none;
color:#4a7cff;
font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">
<div class="menu">☰</div>
</div>

<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
</div>

<h1>Hi, this is</h1>

<div class="big">
Lý Văn Thắng Website Tải Esign & Ksign Free ✔️
</div>

<div class="dev">
and I'm a <span id="typing"></span>
</div>

<div class="desc">
Nếu Bạn Có Nhu Cầu Mua Chứng Chỉ Esign - Ksign <br>
Vui Lòng Truy Cập Web : <br>
<a href="https://muachungchi.xo.je" target="_blank">https://iossign.xo.je</a>
</div>

<div class="social">

<div class="box">
<img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
</div>

<div class="box">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
</div>

<div class="box">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</div>

</div>

<script>

let words=["Developer.","iOS Signer.","Web Creator."];
let i=0;
let j=0;
let current="";
let deleting=false;

function type(){

current=words[i];

if(deleting){
j--;
}else{
j++;
}

document.getElementById("typing").innerHTML=current.substring(0,j);

if(!deleting && j==current.length){
deleting=true;
setTimeout(type,1000);
return;
}

if(deleting && j==0){
deleting=false;
i++;
if(i==words.length){
i=0;
}
}

setTimeout(type,120);

}

type();

</script>

</body>
</html>
