
<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>IOS Thắng Sign</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

/* thanh trên */

.topbar{
background:#222;
color:white;
padding:15px;
font-size:20px;
position:relative;
}

/* nút menu */

.menuBtn{
position:absolute;
right:20px;
top:10px;
font-size:28px;
cursor:pointer;
}

/* menu */

.menu{
position:absolute;
right:10px;
top:55px;
background:white;
width:220px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
text-align:left;
}

.menu a{
display:block;
padding:12px;
border-bottom:1px solid #eee;
text-decoration:none;
color:black;
}

.menu a:last-child{
border:none;
}

/* avatar */

.avatar{
width:120px;
height:120px;
border-radius:50%;
margin-top:30px;
box-shadow:0 0 15px #00aaff;
}

/* tiêu đề */

.title{
font-size:38px;
font-weight:bold;
margin-top:20px;
}

/* chữ chạy */

.subtitle{
color:#2196f3;
margin-top:10px;
height:24px;
}

/* app */

.appbox{
background:white;
margin:30px;
padding:20px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.install{
background:#00c853;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">

IOS Thắng Sign

<span class="menuBtn" onclick="openMenu()">☰</span>

</div>

<div class="menu" id="menu">

<a>👤 Tài khoản : <span id="username"></span></a>

<a>💰 Số dư : <span id="balance">0đ</span></a>

<a href="nap.html">💳 Nạp tiền</a>

<a onclick="logout()">🚪 Đăng xuất</a>

</div>

<img class="avatar" src="https://i.imgur.com/2yaf2wb.png">

<h2>Hi, <span id="hello"></span></h2>

<div class="title">

IOS Thắng Website Tải  
Esign & Ksign Free ✔

</div>

<p class="subtitle" id="typing"></p>

<h2>Signed App</h2>

<div class="appbox">

<div>

<b>Delta VNG Fix Lag IOS</b>
<br>
Version 2.7.10

</div>

<button class="install">

Install

</button>

</div>

<script>

/* mở menu */

function openMenu(){

let m=document.getElementById("menu")

m.style.display = (m.style.display=="block") ? "none":"block"

}

/* đăng xuất */

function logout(){

localStorage.removeItem("login")

location.reload()

}

/* load user */

function loadUser(){

let login=localStorage.getItem("login")

if(!login){

document.getElementById("username").innerHTML="Khách"

return

}

document.getElementById("username").innerHTML=login
document.getElementById("hello").innerHTML=login

}

/* load số dư */

function loadBalance(){

let login=localStorage.getItem("login")

if(!login) return

let users=JSON.parse(localStorage.getItem("users"))||[]

let u=users.find(x=>x.username==login)

if(u){

document.getElementById("balance").innerHTML=(u.money||0)+"đ"

}

}

/* chào theo thời gian */

function greeting(){

let hour=new Date().getHours()

let text=""

if(hour>=5 && hour<12){

text="🌅 Chào Buổi Sáng - Chúc Bạn 1 Ngày Vui Vẻ Cùng Thắng IOS"

}
else if(hour>=12 && hour<18){

text="☀️ Chào Buổi Chiều - Chúc Bạn 1 Ngày Vui Vẻ Cùng Thắng IOS"

}
else{

text="🌙 Chào Buổi Tối - Chúc Bạn Buổi Tối Vui Vẻ Cùng Thắng IOS"

}

alert(text)

}

/* chữ tự viết */

const text="Mua Chứng Chỉ Esign Liên Hệ Telegram @iossigm"

let i=0
let deleting=false

function typingEffect(){

let el=document.getElementById("typing")

if(!deleting){

el.innerHTML=text.substring(0,i)

i++

if(i>text.length){

deleting=true

setTimeout(typingEffect,1500)

return

}

}else{

el.innerHTML=text.substring(0,i)

i--

if(i<0){

deleting=false

i=0

}

}

setTimeout(typingEffect,80)

}

typingEffect()

/* chạy khi vào web */

window.onload=function(){

loadUser()
loadBalance()
greeting()

}

</script>

</body>

</html>
