
<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>IOS Thắng Sign</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.topbar{
background:#222;
color:white;
padding:15px;
font-size:20px;
position:relative;
}

.menuBtn{
position:absolute;
right:20px;
top:10px;
font-size:28px;
cursor:pointer;
}

.menu{
position:absolute;
right:10px;
top:60px;
background:white;
width:220px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
}

.menu a{
display:block;
padding:12px;
border-bottom:1px solid #eee;
text-decoration:none;
color:black;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
margin-top:25px;
}

.appbox{
background:white;
margin:30px;
padding:20px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.install{
background:#00c853;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
}

.loginBox{
margin-top:80px;
}

input{
width:80%;
padding:12px;
margin:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:#2d8cf0;
color:white;
}

</style>

</head>

<body>

<div id="loginPage" class="loginBox">

<h2>Đăng nhập</h2>

<input id="loginUser" placeholder="Tên tài khoản">

<input id="loginPass" type="password" placeholder="Mật khẩu">

<br>

<button onclick="login()">Đăng nhập</button>

<h2>Đăng ký</h2>

<input id="regUser" placeholder="Tên tài khoản">

<input id="regPass" type="password" placeholder="Mật khẩu">

<br>

<button onclick="register()">Đăng ký</button>

</div>

<div id="homePage" style="display:none">

<div class="topbar">

IOS Thắng Sign

<span class="menuBtn" onclick="openMenu()">☰</span>

</div>

<div class="menu" id="menu">

<a>👤 <span id="username"></span></a>

<a>💰 Số dư: <span id="balance">0</span>đ</a>

<a href="nap.html">💳 Nạp tiền</a>

<a onclick="logout()">🚪 Đăng xuất</a>

</div>

<img class="avatar" src="https://i.imgur.com/2yaf2wb.png">

<h2 id="hello"></h2>

<h3>Mua chứng chỉ</h3>

<p>

Zalo: 0395251479<br>
Telegram: @iossigm

</p>

<h2>Signed App</h2>

<div class="appbox">

<div>

<b>Delta VNG Fix Lag IOS</b><br>
Version 2.7.10

</div>

<button class="install">Install</button>

</div>

</div>

<script>

function openMenu(){

let m=document.getElementById("menu")

m.style.display=(m.style.display=="block")?"none":"block"

}

function register(){

let user=regUser.value
let pass=regPass.value

let users=JSON.parse(localStorage.getItem("users"))||[]

users.push({username:user,password:pass,money:0})

localStorage.setItem("users",JSON.stringify(users))

alert("Đăng ký thành công")

}

function login(){

let user=loginUser.value
let pass=loginPass.value

let users=JSON.parse(localStorage.getItem("users"))||[]

let u=users.find(x=>x.username==user && x.password==pass)

if(u){

localStorage.setItem("login",user)

showHome()

}else{

alert("Sai tài khoản")

}

}

function showHome(){

loginPage.style.display="none"
homePage.style.display="block"

let user=localStorage.getItem("login")

username.innerHTML=user
hello.innerHTML="Hi, "+user

loadBalance()

}

function loadBalance(){

let login=localStorage.getItem("login")

let users=JSON.parse(localStorage.getItem("users"))||[]

let u=users.find(x=>x.username==login)

if(u){

balance.innerHTML=u.money

}

}

function logout(){

localStorage.removeItem("login")

location.reload()

}

window.onload=function(){

let login=localStorage.getItem("login")

if(login){

showHome()

}

}

</script>

</body>
</html>
