<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Đăng ký</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
width:300px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
background:#2196f3;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1976d2;
}

.link{
margin-top:15px;
}

a{
text-decoration:none;
color:#2196f3;
}

</style>

</head>

<body>

<div class="box">

<h1>Đăng ký</h1>

<input id="user" placeholder="Tên tài khoản">

<input id="email" placeholder="Email">

<input id="pass" type="password" placeholder="Mật khẩu">

<button onclick="register()">Tạo tài khoản</button>

<div class="link">
Đã có tài khoản? <a href="login.html">Đăng nhập</a>
</div>

</div>

<script>

function register(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(user=="" || pass==""){
alert("Vui lòng nhập đầy đủ")
return
}

localStorage.setItem("user",user)
localStorage.setItem("pass",pass)

alert("Đăng ký thành công")

window.location.href="login.html"

}

</script>

</body>
</html>
