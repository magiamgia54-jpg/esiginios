<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Login</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:300px;
text-align:center;
box-shadow:0 0 20px #00aaff;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
background:#00c853;
border:none;
color:white;
border-radius:8px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>ADMIN LOGIN</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Đăng nhập</button>

<p id="msg"></p>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="admin" && p=="123456"){

localStorage.setItem("admin","true")

window.location="admin.html"

}else{

document.getElementById("msg").innerHTML="Sai tài khoản"

}

}

</script>

</body>
</html>
