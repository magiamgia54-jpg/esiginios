<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Nạp tiền</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.box{
margin-top:80px;
background:#1e293b;
padding:25px;
width:340px;
margin-left:auto;
margin-right:auto;
border-radius:12px;
box-shadow:0 0 20px #00aaff;
}

.qr{
width:250px;
margin:10px 0;
}

input{
width:90%;
padding:10px;
margin:8px;
border:none;
border-radius:8px;
}

button{
background:#00c853;
padding:10px 20px;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
}

.typing{
color:#00aaff;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>Nạp tiền</h2>

<img id="qr" class="qr">

<p><b>LY VAN THANG</b></p>
<p>ACB - 23935211</p>

<p class="typing" id="typing"></p>

<input id="money" placeholder="Nhập số tiền">

<br>

<button onclick="taoQR()">Tạo QR</button>

<hr>

<h3>Gửi bill</h3>

<input id="user" placeholder="Tên tài khoản">

<button onclick="send()">Gửi bill</button>

<p id="msg"></p>

</div>

<script>

/* CHỮ CHẠY */

const text="Nạp tối thiểu 10K"

let i=0

function write(){

document.getElementById("typing").innerHTML=text.substring(0,i)

i++

if(i<=text.length) setTimeout(write,80)

}

write()

/* TẠO QR */

function taoQR(){

let money=document.getElementById("money").value

if(money<10000){

alert("Nạp tối thiểu 10K")

return

}

let qr=`https://img.vietqr.io/image/acb-23935211-compact.png?amount=${money}&addInfo=NAPTIEN`

document.getElementById("qr").src=qr

}

/* GỬI BILL */

function send(){

let user=document.getElementById("user").value
let money=document.getElementById("money").value

let data=JSON.parse(localStorage.getItem("bill"))||[]

data.push({

user:user,
money:money,
status:"Chờ duyệt",
time:new Date().toLocaleString()

})

localStorage.setItem("bill",JSON.stringify(data))

document.getElementById("msg").innerHTML="Đã gửi bill"

}

</script>

</body>
</html>
