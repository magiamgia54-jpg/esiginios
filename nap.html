
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Nạp tiền</title>

</head>

<body style="text-align:center;font-family:Arial">

<h2>Nạp tiền</h2>

<input id="money" placeholder="Nhập số tiền">

<br><br>

<button onclick="taoQR()">Tạo QR</button>

<br><br>

<img id="qr" width="250">

<h3>Gửi bill</h3>

<button onclick="send()">Gửi bill</button>

<script>

function taoQR(){

let money=document.getElementById("money").value

let qr=`https://img.vietqr.io/image/acb-23935211-compact.png?amount=${money}`

document.getElementById("qr").src=qr

}

function send(){

let money=document.getElementById("money").value

let user=localStorage.getItem("login")

let data=JSON.parse(localStorage.getItem("bill"))||[]

data.push({

user:user,
money:money,
status:"Chờ"

})

localStorage.setItem("bill",JSON.stringify(data))

alert("Đã gửi bill")

}

</script>

</body>
</html>
